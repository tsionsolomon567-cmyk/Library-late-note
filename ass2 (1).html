<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html>
<head>
    <title>Library Late Notice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .container {
            width: 600px;
            margin: 0 auto;
            background-color: white;
            border: 2px solid black;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #cc0000;
            text-decoration: underline;
        }

        .nav-menu {
            text-align: center;
            border: 1px solid #333;
            padding: 10px;
            margin-bottom: 20px;
            background-color: #dddddd;
        }

        .nav-menu a {
            margin: 0 20px;
            text-decoration: none;
            color: blue;
            font-weight: bold;
        }

        .notice-box {
            border: 3px solid red;
            padding: 15px;
            line-height: 1.8;
        }

        .notice-box input {
            width: 100%;
            padding: 6px;
            margin: 5px 0 15px 0;
            border: 1px solid #333;
            border-radius: 4px;
        }

        .alert-box {
            background-color: #ffcccc;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            border: 1px solid red;
            margin-top: 15px;
        }

        /* Blue bold submit button */
        .submit-btn {
            display: block;
            margin: 20px auto 0 auto;
            background-color: #007bff;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #0056b3;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            border-top: 1px solid black;
            font-size: 13px;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    
    <h1>Library Late Notice</h1>

    <div class="nav-menu">
        <a href="#">Home</a>
        <a href="https://education.gov.vc/education/index.php/libaries/rules-of-the-library" target="_blank">Library Rules</a>
    </div>

    <form class="notice-box">
        <label><strong>Borrower Name:</strong></label>
        <input type="text" placeholder="Type borrower name here">

        <label><strong>Book Title:</strong></label>
        <input type="text" placeholder="Type book title here">

        <label><strong>Due Date:</strong></label>
        <input type="text" placeholder="Type due date here">

        <div class="alert-box">
            "This book is overdue. Please return it immediately to avoid fines."
        </div>

        <p style="text-align: center; margin-top: 20px;">
            To find book return locations, visit: <br>
            <a href="https://www.worldcat.org" target="_blank" style="color: green; font-weight: bold;">www.worldcat.org</a>
        </p>

        <!-- Blue bold Submit button -->
        <button type="submit" class="submit-btn">Submit</button>
    </form>

    <div class="footer">
        <p>Contact:  tsionSolomon567@gmail.com</p>
    </div>

</div>

</body>
</html>
